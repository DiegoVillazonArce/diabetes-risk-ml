# Clean-clone continuous integration for diabetes-risk-ml (decision D-034).
#
# This workflow protects the serving and regression contracts on a fresh
# checkout that does NOT contain the git-ignored raw BRFSS CSV. It installs the
# pinned Python 3.12 environment, checks dependency consistency, byte-compiles
# the code, and runs the full pytest suite. In the final local P13 clean-clone
# validation, the 28 raw-data tests skipped with explicit reasons and the other
# 441 tests passed; the workflow requires every collected non-skipped test to
# pass and does not freeze that passing count as the suite grows.
#
# It deliberately does not: use Kaggle credentials, deployment secrets, or any
# private data; train a model; regenerate evidence; write or commit an artifact.
# The complete raw-data suite remains a documented local closure gate.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege: the job only needs to read the repository.
permissions:
  contents: read

jobs:
  clean-clone-tests:
    name: Clean-clone tests (Python 3.12, no dataset)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check dependency consistency
        run: python -m pip check

      - name: Byte-compile sources
        run: python -m compileall src app tests

      - name: Run tests (raw dataset absent; CSV-gated tests skip)
        run: python -m pytest tests -p no:cacheprovider
